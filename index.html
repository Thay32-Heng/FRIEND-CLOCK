<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Friend-Clock — Birthday Tracker</title>
    <link rel="stylesheet" href="Style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Orbitron:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  </head>
  <body>
    <div id="birthday-stage" class="birthday-stage hidden">
      <div class="stage-overlay">
        <div class="stage-content">
          <img id="stage-img" src="" alt="" class="stage-img" />
          <h1 class="stage-text">
            Happy Birthday, <span id="stage-name"></span>! 🎉
          </h1>
          <p class="stage-subtext">The celebration continues all day long!</p>
          <div class="stage-actions">
            </button>
            <button id="btn-hotpot" class="btn-hotpot">
              Invite to Hotpot 🍲
            </button>
          </div>
        </div>
      </div>
    </div>

    <audio id="bday-audio" loop>
      <source src="audio/saavane-happy-birthday-254480.mp3" type="audio/mpeg" />
    </audio>
    <header class="header">
      <div class="header__inner">
        <h1 class="header__title">&#128368; Friend-Clock</h1>
        <p class="header__subtitle">Never miss a birthday again</p>
      </div>
    </header>

    <main class="container">
      <div id="birthday-grid" class="birthday-grid"></div>
      <p class="empty-state" id="empty-state"></p>
    </main>

    <footer class="footer">
      <div class="container footer__inner" id="friendship-stats"></div>
    </footer>

    <script src="main.js"></script>
  </body>
</html>
