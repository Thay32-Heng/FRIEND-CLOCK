<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Friend-Clock — Birthday Tracker</title>
    <link rel="stylesheet" href="Style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Orbitron:wght@500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- ========== HEADER ========== -->
    <header class="header">
      <div class="header__inner">
        <h1 class="header__title">&#128368; Friend-Clock</h1>
        <p class="header__subtitle">Never miss a birthday again</p>
      </div>
    </header>

    <!-- ========== MAIN GRID ========== -->
    <main class="container">
      <div id="birthday-grid" class="birthday-grid">
        <!-- Cards injected by JS -->
      </div>
      <p class="empty-state" id="empty-state">
        No friends added yet.<br />Add friends in <strong>main.js</strong> to
        get started!
      </p>
    </main>

    <script src="main.js"></script>
  </body>
</html>
